<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050505"/>
      <stop offset="100%" style="stop-color:#0a1a0a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-lg">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <g opacity="0.08" stroke="#00ff41" stroke-width="0.5">
    <line x1="0" y1="0" x2="1200" y2="630"/>
    <line x1="1200" y1="0" x2="0" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <rect x="300" y="115" width="600" height="400" rx="4" fill="none"/>
    <rect x="350" y="145" width="500" height="340" rx="4" fill="none"/>
  </g>
  <!-- Portal Gate -->
  <g filter="url(#glow-lg)" opacity="0.3">
    <ellipse cx="600" cy="315" rx="200" ry="250" fill="none" stroke="#00ff41" stroke-width="2"/>
    <ellipse cx="600" cy="315" rx="160" ry="210" fill="none" stroke="#00ff41" stroke-width="1"/>
  </g>
  <!-- Central diamond -->
  <g filter="url(#glow)">
    <polygon points="600,180 680,315 600,450 520,315" fill="none" stroke="#00ff41" stroke-width="2"/>
    <polygon points="600,220 650,315 600,410 550,315" fill="none" stroke="#00ff41" stroke-width="1" opacity="0.5"/>
  </g>
  <!-- Title -->
  <text x="600" y="285" text-anchor="middle" font-family="monospace" font-size="52" font-weight="bold" fill="#00ff41" filter="url(#glow)">TRIARCHY</text>
  <text x="600" y="345" text-anchor="middle" font-family="monospace" font-size="40" fill="#00ff41" filter="url(#glow)">TOKEN GATE</text>
  <!-- Subtitle -->
  <text x="600" y="400" text-anchor="middle" font-family="monospace" font-size="20" fill="#666">Farcaster Frame · On-Chain Authorization Protocol</text>
  <!-- Corners -->
  <g stroke="#00ff41" stroke-width="2" opacity="0.6">
    <polyline points="30,30 30,80" fill="none"/><polyline points="30,30 80,30" fill="none"/>
    <polyline points="1170,30 1170,80" fill="none"/><polyline points="1170,30 1120,30" fill="none"/>
    <polyline points="30,600 30,550" fill="none"/><polyline points="30,600 80,600" fill="none"/>
    <polyline points="1170,600 1170,550" fill="none"/><polyline points="1170,600 1120,600" fill="none"/>
  </g>
  <!-- Status line -->
  <text x="600" y="560" text-anchor="middle" font-family="monospace" font-size="14" fill="#333">STELLAR-AGENT-LABS // D2085 // STELLAR HACKS 2026</text>
</svg>
